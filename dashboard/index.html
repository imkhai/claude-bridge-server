<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Bridge — Agent Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/simple-mode.css">
  <link rel="stylesheet" href="css/real-mode.css">
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 16 Q16 2 26 16' stroke='%23D97757' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3Cline x1='6' y1='16' x2='26' y2='16' stroke='%23D97757' stroke-width='1' opacity='0.4'/%3E%3Ccircle cx='5' cy='12' r='1.8' fill='%23E8DDD3'/%3E%3Ccircle cx='5' cy='16' r='1.8' fill='%23E8DDD3'/%3E%3Ccircle cx='5' cy='20' r='1.8' fill='%23E8DDD3'/%3E%3Ccircle cx='27' cy='16' r='2.8' fill='%23D97757'/%3E%3C/svg%3E">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <svg class="logo-svg" viewBox="0 0 32 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 16 Q16 2 26 16" stroke="#D97757" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <line x1="6" y1="16" x2="26" y2="16" stroke="#D97757" stroke-width="1" opacity="0.4"/>
          <circle cx="5" cy="12" r="1.8" fill="#E8DDD3"/>
          <circle cx="5" cy="16" r="1.8" fill="#E8DDD3"/>
          <circle cx="5" cy="20" r="1.8" fill="#E8DDD3"/>
          <circle cx="27" cy="16" r="2.8" fill="#D97757"/>
        </svg>
        <span class="header-title">CLAUDE BRIDGE</span>
        <span class="connection-dot connecting" id="connection-status" title="Connecting"></span>
        <span class="connection-label" id="connection-label">Connecting...</span>
        <span class="header-uptime" id="header-uptime">uptime: --</span>
      </div>
      <div class="header-right">
        <span class="header-workers" id="header-workers">Workers: -/- | Queue: -</span>
        <button class="mode-btn" id="mode-toggle-real" title="Real Mode (1)">Real</button>
        <button class="mode-btn active" id="mode-toggle-simple" title="Simple Mode (2)">Simple</button>
        <a class="mode-btn" href="/chat/" title="Chat Commander" style="text-decoration:none;">Chat</a>
        <button class="mode-btn" id="fullscreen-btn" title="Fullscreen (f)">&#x26F6;</button>
      </div>
    </header>
    <main id="main">
      <div id="simple-mode" class="mode-container active">
        <!-- Terminal UI is rendered dynamically by js/simple/terminal.mjs -->
      </div>
      <div id="real-mode" class="mode-container">
        <canvas id="office-canvas"></canvas>
        <div id="real-overlay">
          <div id="real-timeline"></div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="js/app.mjs"></script>
</body>
</html>
